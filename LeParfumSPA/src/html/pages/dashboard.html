<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/src/css/output.css">
    <link rel="shortcut icon" href="/assets/favicon.png" type="image/x-icon">
    <title>Lê Parfum Dashboard</title>
</head>

<body class="min-h-screen">
    <div class="layout">
        <!-- Container fixo de notificação no canto superior direito -->
        <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none"></div>

        <!--Injeção de componente sidebar-->
        <div id="sidebar"></div>

        <section class="w-full min-h-screen overflow-y-auto">
            <!--Injeção de componente header-->
            <div id="header"></div>
            <main class="bg-[#F8F6F3] grid grid-cols-4 grid-rows-2 w-full gap-4 p-4 h-254">
                <!--Lado Esquerdo-->
                <div
                    class="bg-[#F8F6F3] px-6 py-4 border-b border-t border-stone-200 col-span-3 row-span-2 rounded-lg shadow-md">
                    <div class="flex justify-between items-center px-2 py-4 border-b border-stone-200">
                        <div class="tracking-widest">
                            <h1 class="text-3xl text-[#2C241E] text-shadow-sm">Todos os perfumes</h1>
                            <p class="text-[#9c928a] text-shadow-sm">Gerencie seus produtos e mantenha seu catálogo
                                atualizado.</p>
                        </div>
                        <button id="btnNewProduct"
                            class="flex gap-6 items-center bg-[#8c6b4a] p-4 rounded-lg drop-shadow-md text-white font-semibold cursor-pointer hover:bg-amber-800/80 transition-all transform active:scale-85">
                            <img class="invert ml-2 w-4 h-4" src="/assets/iconsDashboard/mais.svg">
                            <span>Novo Produto</span>
                        </button>
                    </div>

                    <!--área para modais-->
                    <div id="newProduct"></div>

                    <div class="p-4 bg-white border border-gray-100 rounded-lg shadow-sm">
                        <form id="filterForm" class="flex flex-wrap items-end gap-3">

                            <div class="flex-1 min-w-60">
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                                        </svg>
                                    </span>
                                    <input type="text" id="searchBox" placeholder="Buscar por nome ou marca..."
                                        class="w-full pl-9 pr-3 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-[#5B4031] focus:border-[#5B4031]">
                                </div>
                            </div>

                            <div class="w-32">
                                <label
                                    class="block mb-1 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Categoria</label>
                                <select id="filterCategories"
                                    class="w-full px-2 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-[#5B4031]">
                                    <option value="">Todas</option>
                                </select>
                            </div>

                            <div class="w-32">
                                <label
                                    class="block mb-1 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Marca</label>
                                <select id="filterBrands"
                                    class="w-full px-2 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-[#5B4031]">
                                    <option value="">Todas</option>
                                </select>
                            </div>

                            <div class="w-32">
                                <label
                                    class="block mb-1 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Gênero</label>
                                <select id="filterGenders"
                                    class="w-full px-2 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-[#5B4031]">
                                    <option value="">Todos</option>
                                </select>
                            </div>

                            <div class="w-32">
                                <label
                                    class="block mb-1 text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Em
                                    destaque</label>
                                <select id="filterDestaque"
                                    class="w-full px-2 py-1.5 text-xs bg-gray-50 border border-gray-200 rounded focus:outline-none focus:ring-1 focus:ring-[#5B4031]">
                                    <option value="">Todos</option>
                                </select>
                            </div>

                            <div class="flex items-center gap-2">
                                <button type="submit"
                                    class="flex items-center gap-1 bg-[#5B4031] text-white px-3 py-1.5 text-xs font-medium rounded hover:bg-[#4a3327]">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z">
                                        </path>
                                    </svg>
                                    Filtrar
                                </button>
                                <button type="button" id="clearFilters"
                                    class="flex items-center gap-1 border border-gray-200 text-gray-500 px-3 py-1.5 text-xs font-medium rounded hover:bg-gray-50">
                                    Limpar
                                </button>
                            </div>

                        </form>
                    </div>

                    <div class="overflow-hidden bg-white border border-gray-200 rounded-lg shadow-sm">
                        <div class="overflow-x-auto">
                            <table class="w-full text-xs text-left text-gray-600 border-collapse">
                                <thead class="text-gray-500 bg-gray-50 border-b border-gray-200 font-semibold">
                                    <tr>
                                        <th scope="col" class="px-6 py-3 w-[30%]">Produto</th>
                                        <th scope="col" class="px-6 py-3">Marca</th>
                                        <th scope="col" class="px-6 py-3">Categoria</th>
                                        <th scope="col" class="px-6 py-3">Gênero</th>
                                        <th scope="col" class="px-6 py-3">Preço</th>
                                        <th scope="col" class="px-6 py-3 text-center">Destaque</th>
                                        <th scope="col" class="px-6 py-3 text-center">Ações</th>
                                    </tr>
                                </thead>
                                <!--Injeção de produtos na tabela-->
                                <tbody id="productTableBody" class="divide-y divide-gray-100">
                                </tbody>
                            </table>
                        </div>

                        <div
                            class="flex flex-col items-center justify-between gap-4 p-4 border-t border-gray-100 sm:flex-row text-gray-500">
                            <div>
                                <span>Mostrando <span class="font-medium text-gray-700">1</span> a <span
                                        class="font-medium text-gray-700">6</span> de <span
                                        class="font-medium text-gray-700">24</span> produtos</span>
                            </div>

                            <div class="flex items-center space-x-1">
                                <button class="px-2 py-1 text-gray-400 hover:bg-gray-100 rounded">&lt;</button>
                                <button class="px-3 py-1 bg-[#5B4031] text-white font-medium rounded">1</button>
                                <button class="px-3 py-1 hover:bg-gray-100 rounded">2</button>
                                <button class="px-3 py-1 hover:bg-gray-100 rounded">3</button>
                                <button class="px-3 py-1 hover:bg-gray-100 rounded">4</button>
                                <button class="px-2 py-1 text-gray-400 hover:bg-gray-100 rounded">&gt;</button>
                            </div>

                            <div class="flex items-center gap-2">
                                <select
                                    class="px-2 py-1 text-xs bg-gray-50 border border-gray-200 rounded focus:outline-none">
                                    <option>6 por página</option>
                                    <option>12 por página</option>
                                    <option>24 por página</option>
                                </select>
                            </div>
                        </div>

                    </div>
                </div>

                <!--Lado direito cima-->
                <div class="bg-[#ffffff] space-y-6 rounded-lg shadow-md p-6 h-115">
                    <h2 class="text-2xl text-[#2C241E]">Resumo</h2>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="bg-[#F8F6F3] grid grid-rows-3 rounded-lg py-4 px-2 shadow-lg">
                            <img class="bg-[#faefdf] rounded-xl w-8 h-8 mb-2" src="/assets/iconsDashboard/perfume.png">
                            <span id="total-produtos" class="pt-2 text-2xl font-semibold text-[#2c241e]">0</span>
                            <p class="pt-4">Total de Produtos</p>
                        </div>
                        <div class="bg-[#F8F6F3] grid grid-rows-3 rounded-lg py-4 px-2 shadow-lg">
                            <img class="bg-[#faefdf] rounded-xl w-8 h-8 mb-2" src="/assets/iconsDashboard/estrela.svg">
                            <p id="produtos-destaque" class="pt-2 text-2xl font-semibold text-[#2c241e]">0</p>
                            <p class="pt-4">Em destaque</p>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 grid-rows-2 gap-6">
                        <div class="bg-[#F8F6F3] grid grid-rows-3 rounded-lg py-4 px-2 shadow-lg">
                            <img class="bg-[#faefdf] rounded-xl w-8 h-8 mb-2"
                                src="/assets/iconsDashboard/file-and-folder.png">
                            <p id="total-categorias" class="pt-2 text-2xl font-semibold text-[#2c241e]">0</p>
                            <p class="pt-4">Categorias</p>
                        </div>
                        <div class="bg-[#F8F6F3] grid grid-rows-3 rounded-lg py-4 px-2 shadow-lg">
                            <img class="bg-[#faefdf] rounded-xl w-8 h-8 mb-2"
                                src="/assets/iconsDashboard/bolsa-de-compras.svg">
                            <p id="total-marcas" class="pt-2 text-2xl font-semibold text-[#2c241e]">0</p>
                            <p class="pt-4">Marcas</p>
                        </div>
                    </div>
                </div>
                <!--Lado direito baixo-->
                <div class="bg-[#ffffff] space-y-6 rounded-lg shadow-md p-6">
                    <h2>Produtos em destaque</h2>
                    <!--Injeção de produtos em destaque-->
                    <div>Produtos injetados via js</div>
                    <div><button>Ver todos</button></div>
                </div>
            </main>
        </section>
    </div>
    <script type="module" src="/src/js/dashboard.js"></script>
</body>

</html>
